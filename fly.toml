# Fly.io config. The `app` line is omitted intentionally — `fly deploy`
# (or the GitHub auto-deploy) will use whichever app the repo is connected to.
primary_region = "iad"

[build]

[deploy]
  # Initialize SQLite schema before the new release goes live.
  release_command = "python -m src.core.init_db"

[env]
  ALPACA_PAPER = "true"
  DATABASE_URL = "sqlite:////app/data/trading.db"
  LOG_LEVEL = "INFO"

# Persistent volume for SQLite. The volume name must match an existing volume
# in the same region as the app (see Volumes tab in the Fly dashboard).
[mounts]
  source = "data"
  destination = "/app/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# This is a worker, not a webserver — no [[services]] block.
# Launch the dashboard separately (e.g. `fly machines run` with a different cmd).
