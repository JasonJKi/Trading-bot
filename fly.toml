# fly.toml app configuration file generated for trading-bot-uyye0w on 2026-04-27T11:45:55Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-bot-uyye0w'
primary_region = 'iad'

[build]

[env]
  ALPACA_PAPER = 'true'
  DATABASE_URL = 'sqlite:////app/data/trading.db'
  LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
