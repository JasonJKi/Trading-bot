# Fly.io config for the trading-bot worker.
# Deliberately omits [app] so it works with any app name created via `fly launch`
# or the Fly dashboard.
#
# This is a worker (background process) — there is no [http_service] / [[services]] block.
# That is intentional: the bot doesn't listen on any port. Launch the dashboard
# separately if you want it (different app or `fly machines run`).
primary_region = "iad"

[build]

[env]
  ALPACA_PAPER = "true"
  DATABASE_URL = "sqlite:////app/data/trading.db"
  LOG_LEVEL = "INFO"

# Persistent volume for SQLite. Create the volume in the same region as the app
# *before* deploying:  fly volumes create data --size 1 --region iad
[mounts]
  source = "data"
  destination = "/app/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
