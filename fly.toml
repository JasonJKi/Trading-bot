# Fly.io config for trading-bot.
# One app, two processes running in the same machine sharing the SQLite volume:
#   - orchestrator (background worker, no port)
#   - Streamlit dashboard (HTTP on 8080)
# Auth on the dashboard is via a DASHBOARD_PASSWORD secret (see README).

app = 'trading-bot-cpg3lw'
primary_region = 'nrt'

[build]

[deploy]
  release_command = 'python -m src.core.init_db'

[env]
  ALPACA_PAPER = 'true'
  DATABASE_URL = 'sqlite:////app/data/trading.db'
  LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'data'
  destination = '/app/data'

# Worker must stay alive for cron schedules — do NOT auto-stop on idle.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # Bumped 256 -> 512 MB to accommodate Streamlit + Plotly alongside the worker.
  memory_mb = 512
