# Fly.io config for trading-bot.
# One Fly machine runs everything in one container:
#   - orchestrator (background worker — no public port)
#   - FastAPI on :8000 (serves /api/* AND the static Next.js dashboard at /)
#   - SQLite on the persistent /app/data volume
#
# Auth on the dashboard is via the DASHBOARD_PASSWORD secret (cookie gate).
# Set it with:  fly secrets set DASHBOARD_PASSWORD=$(openssl rand -hex 16)

app = 'trading-bot-cpg3lw'
primary_region = 'nrt'

[build]

[deploy]
  release_command = 'python -m src.core.init_db'

[env]
  ALPACA_PAPER = 'true'
  DATABASE_URL = 'sqlite:////app/data/trading.db'
  LOG_LEVEL = 'INFO'
  LOG_FORMAT = 'json'

[[mounts]]
  source = 'data'
  destination = '/app/data'

# Worker must stay alive for cron schedules — do NOT auto-stop on idle.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Periodic health probe, used by Fly to mark the machine ready.
  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'get'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # 512 MB is tight with pandas+yfinance+orchestrator+uvicorn loaded simultaneously.
  # Bump to 1 GB to leave headroom and avoid OOM-kills during regime detection.
  memory_mb = 1024
