# fly.toml app configuration file generated for trading-bot-cpg3lw on 2026-04-27T12:26:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trading-bot-cpg3lw'
primary_region = 'nrt'

[build]

[deploy]
  release_command = 'python -m src.core.init_db'

[env]
  ALPACA_PAPER = 'true'
  DATABASE_URL = 'sqlite:////app/data/trading.db'
  LOG_LEVEL = 'INFO'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
